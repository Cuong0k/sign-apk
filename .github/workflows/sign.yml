name: Sign APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Zipalign
        run: |
          BUILD_TOOLS=$(ls $ANDROID_SDK_ROOT/build-tools/ | sort -V | tail -1)
          $ANDROID_SDK_ROOT/build-tools/$BUILD_TOOLS/zipalign -p -f 4 vpnclient_patched.apk vpnclient_aligned.apk
      - name: Generate keystore
        run: |
          keytool -genkey -v -keystore debug.keystore -alias key0 \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Debug,O=Android,C=US"
      - name: Sign
        run: |
          BUILD_TOOLS=$(ls $ANDROID_SDK_ROOT/build-tools/ | sort -V | tail -1)
          APKSIGNER=$ANDROID_SDK_ROOT/build-tools/$BUILD_TOOLS/apksigner
          $APKSIGNER sign --ks debug.keystore --ks-key-alias key0 \
            --ks-pass pass:android --key-pass pass:android \
            --out vpnclient_final.apk vpnclient_aligned.apk
          $APKSIGNER verify --verbose vpnclient_final.apk | head -3
      - uses: actions/upload-artifact@v4
        with:
          name: vpnclient-signed
          path: vpnclient_final.apk
